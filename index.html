<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cobra Escape</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff0040;
            --neon-orange: #ff8800;
            --dark: #050505;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            width:100%; height:100vh; overflow:hidden; background:var(--dark);
            font-family:'Segoe UI', system-ui, sans-serif; color:#fff; touch-action:manipulation;
        }
        .screen { position:fixed; inset:0; display:none; opacity:0; transition:opacity 0.5s; }
        .screen.active { display:flex; opacity:1; }

        #home-screen, #levels-screen {
            flex-direction:column; justify-content:center; align-items:center;
            background:radial-gradient(circle at 50% 30%, #1a0a00, #000);
        }
        .title { font-size:clamp(52px,14vw,90px); font-weight:900; letter-spacing:8px;
            background:linear-gradient(90deg,#00ff41,#ff8800); -webkit-background-clip:text; color:transparent;
        }
        .subtitle { font-size:clamp(22px,6vw,32px); color:#ff8800; letter-spacing:12px; margin-top:-10px; }

        .glow-btn {
            margin:15px 0; padding:16px 48px; font-size:17px; font-weight:700;
            background:transparent; border:3px solid var(--neon-green); color:var(--neon-green);
            border-radius:50px; box-shadow:0 0 25px #00ff41; transition:all 0.3s;
        }
        .glow-btn:active { transform:scale(0.92); }

        .levels-grid {
            display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:380px; padding:20px;
        }
        .level-card {
            background:rgba(0,255,65,0.08); border:2px solid rgba(0,255,65,0.3);
            padding:12px; border-radius:12px; text-align:center; cursor:pointer;
        }
        .level-card.locked { opacity:0.45; pointer-events:none; filter:grayscale(1); }
        .level-card.completed { border-color:#00ff41; background:rgba(0,255,65,0.2); }

        #game-screen { flex-direction:column; }
        .top-bar {
            display:flex; justify-content:space-between; align-items:center;
            padding:12px 16px; background:rgba(0,0,0,0.85); border-bottom:1px solid rgba(0,255,65,0.2);
        }
        .canvas-container {
            flex:1; display:flex; justify-content:center; align-items:center;
            background:#0a0a0a; padding:8px;
        }
        #game-canvas {
            border:3px solid rgba(0,255,65,0.4); border-radius:12px;
            box-shadow:0 0 30px rgba(0,255,65,0.3); image-rendering:pixelated;
        }
        .bottom-bar {
            padding:12px; background:rgba(0,0,0,0.85); 
            display:flex; justify-content:space-around; align-items:center;
            gap:15px;
        }
        .score-card {
            background:rgba(0,255,65,0.1); border:2px solid var(--neon-green);
            padding:12px 20px; border-radius:12px; text-align:center; min-width:120px;
        }
        .score-card span { font-size:22px; font-weight:bold; color:#00ff41; display:block; }
        .dpad {
            display:grid; grid-template-columns:repeat(3,1fr); gap:6px; width:190px;
        }
        .dpad button {
            width:58px; height:58px; font-size:26px; background:rgba(0,255,65,0.1);
            border:2px solid var(--neon-green); color:var(--neon-green); border-radius:14px;
        }
        .target { font-size:12px; color:#ff8800; margin-top:4px; }

        .overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none;
            justify-content:center; align-items:center; z-index:100;
        }
        .overlay.active { display:flex; }
        .overlay-box {
            background:rgba(10,20,10,0.95); border:2px solid var(--neon-green);
            padding:30px 40px; border-radius:16px; text-align:center; min-width:280px;
        }
        .new-record { color:#ff8800; font-size:18px; margin:12px 0; animation:pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity:0.6; } }
    </style>
</head>
<body>

    <!-- Loading -->
    <div id="loading-screen" class="screen active" style="flex-direction:column;justify-content:center;align-items:center;background:#050505;">
        <div style="width:90px;height:90px;border:6px solid #00ff41;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <p style="margin-top:25px;color:#00ff41;letter-spacing:8px;">COBRA ESCAPE</p>
    </div>

    <!-- Home -->
    <div id="home-screen" class="screen">
        <div style="text-align:center;">
            <div class="title">COBRA</div>
            <div class="subtitle">ESCAPE</div>
            <button id="start-btn" class="glow-btn">START GAME</button>
            <button id="levels-menu-btn" class="glow-btn">SELECT LEVEL</button>
            <p style="margin-top:30px;color:#aaa;">High Score: <span id="home-highscore" style="color:#ff8800;">0</span></p>
        </div>
    </div>

    <!-- Levels -->
    <div id="levels-screen" class="screen">
        <h2 style="color:#00ff41;margin:20px 0;">SELECT LEVEL</h2>
        <div class="levels-grid" id="levels-grid"></div>
        <button id="back-to-home" class="glow-btn">← BACK</button>
    </div>

    <!-- Game -->
    <div id="game-screen" class="screen">
        <div class="top-bar">
            <div>LEVEL <span id="level" style="color:#00ff41;font-weight:bold;">1</span></div>
            <div>TIME <span id="timer" style="color:#ff8800;">00:00</span></div>
            <button id="pause-btn" style="background:none;border:none;color:#00ff41;font-size:28px;width:40px;height:40px;">⏸</button>
        </div>

        <div class="canvas-container">
            <canvas id="game-canvas"></canvas>
        </div>

        <div class="bottom-bar">
            <div class="score-card">
                <small style="color:#aaa;">SCORE</small>
                <span id="score">0</span>
                <div class="target">Target: <span id="target-score">250</span></div>
            </div>
            <div class="dpad">
                <div></div><button id="up">▲</button><div></div>
                <button id="left">◀</button><button id="center">●</button><button id="right">▶</button>
                <div></div><button id="down">▼</button><div></div>
            </div>
        </div>
    </div>

    <!-- Overlays -->
    <div id="pause-overlay" class="overlay"><div class="overlay-box"><h2 style="color:#00ff41;">PAUSED</h2><button id="resume-btn" class="glow-btn">RESUME</button><button id="quit-btn" class="glow-btn">MENU</button></div></div>
    <div id="gameover-overlay" class="overlay"><div class="overlay-box"><h2 style="color:#ff0040;">GAME OVER</h2><p>Score: <span id="go-score"></span></p><p id="new-record-text" class="new-record" style="display:none;">🎉 YOU BROKE THE RECORD!</p><button id="retry-btn" class="glow-btn">TRY AGAIN</button><button id="gohome1" class="glow-btn">MENU</button></div></div>
    <div id="victory-overlay" class="overlay"><div class="overlay-box"><h2 style="color:#00ff41;">LEVEL COMPLETE!</h2><p>Score: <span id="vic-score"></span></p><p id="new-record-text-vic" class="new-record" style="display:none;">🎉 YOU BROKE THE RECORD!</p><button id="next-btn" class="glow-btn">NEXT LEVEL</button><button id="gohome2" class="glow-btn">MENU</button></div></div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let gridW = 24, gridH = 20, cell = 24;
        let snake, food = null, specialMouse = null, walls = [];
        let dx = 1, dy = 0, score = 0, gameState = 'idle';
        let currentLevel = 1, elapsed = 0, startTime = 0, tickRate = 150;
        let lastTick = 0;
        let highScore = 0;
        let unlockedLevels = [1];
        let audioCtx;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playSound(freq, duration, type='sine', vol=0.3) {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.value = vol;
            osc.connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function loadProgress() {
            highScore = parseInt(localStorage.getItem('cobraHighScore')) || 0;
            unlockedLevels = JSON.parse(localStorage.getItem('cobraUnlocked')) || [1];
            document.getElementById('home-highscore').textContent = highScore;
        }

        function saveProgress() {
            localStorage.setItem('cobraHighScore', highScore);
            localStorage.setItem('cobraUnlocked', JSON.stringify(unlockedLevels));
        }

        class Snake {
            constructor() {
                this.body = [];
                for (let i = 5; i >= 0; i--) this.body.push({x: 8 + i, y: 10});
            }
        }

        function resize() {
            const max = Math.min(window.innerWidth - 30, 580);
            cell = Math.floor(max / gridW);
            canvas.width = gridW * cell;
            canvas.height = gridH * cell;
        }

        function initLevel(level) {
            resize();
            currentLevel = level;
            score = 0;
            elapsed = 0;
            startTime = Date.now();
            tickRate = Math.max(40, 190 - (level * 13));

            snake = new Snake();
            dx = 1; dy = 0;

            walls = [];
            const wallCount = 4 + level * 3;
            for (let i = 0; i < wallCount; i++) {
                let x = 3 + Math.floor(Math.random() * (gridW-6));
                let y = 3 + Math.floor(Math.random() * (gridH-6));
                if (Math.abs(x-10) < 4 && Math.abs(y-10) < 4) continue;
                walls.push({x, y});
            }

            spawnFood();
            specialMouse = null;
            gameState = 'playing';
            lastTick = Date.now();
            requestAnimationFrame(gameLoop);
        }

        function spawnFood() {
            let x, y;
            do {
                x = Math.floor(Math.random() * gridW);
                y = Math.floor(Math.random() * gridH);
            } while (snake.body.some(s => s.x === x && s.y === y) || walls.some(w => w.x === x && w.y === y));
            food = {x, y};
        }

        function spawnSpecialMouse() {
            if (Math.random() < 0.4) {
                let x, y;
                do {
                    x = Math.floor(Math.random() * gridW);
                    y = Math.floor(Math.random() * gridH);
                } while (snake.body.some(s => s.x === x && s.y === y) || walls.some(w => w.x === x && w.y === y));
                specialMouse = {x, y};
            }
        }

        function gameLoop() {
            if (gameState !== 'playing') return;

            const now = Date.now();
            elapsed = Math.floor((now - startTime) / 1000);

            if (now - lastTick > tickRate) {
                update();
                lastTick = now;
            }

            render();

            const target = 200 + currentLevel * 100;
            if (score >= target) victory();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            const head = {x: snake.body[0].x + dx, y: snake.body[0].y + dy};

            if (head.x < 0 || head.x >= gridW || head.y < 0 || head.y >= gridH) return gameOver();
            if (snake.body.some(s => s.x === head.x && s.y === head.y)) return gameOver();
            if (walls.some(w => w.x === head.x && w.y === head.y)) return gameOver();

            snake.body.unshift(head);

            let ate = false;

            if (food && head.x === food.x && head.y === food.y) {
                score += 15;
                playSound(900, 0.08, 'sine', 0.4);
                ate = true;
                spawnFood();
            }

            if (specialMouse && head.x === specialMouse.x && head.y === specialMouse.y) {
                score += 70;
                playSound(1200, 0.15); playSound(1500, 0.2);
                specialMouse = null;
                ate = true;
            }

            if (!ate) snake.body.pop();

            if (!food) spawnFood();
            if (!specialMouse && Math.random() < 0.022) spawnSpecialMouse();
        }

        function render() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = 'rgba(0,255,65,0.08)';
            for (let i = 0; i <= gridW; i++) {
                ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,canvas.height); ctx.stroke();
            }

            // Walls
            ctx.fillStyle = '#555';
            ctx.shadowColor = '#ff8800';
            ctx.shadowBlur = 12;
            walls.forEach(w => ctx.fillRect(w.x*cell+3, w.y*cell+3, cell-6, cell-6));
            ctx.shadowBlur = 0;

            // Snake with better graphics
            snake.body.forEach((seg, i) => {
                ctx.shadowColor = i===0 ? '#00ff88' : '#00ff41';
                ctx.shadowBlur = i===0 ? 22 : 12;
                ctx.fillStyle = i===0 ? '#00ff88' : '#00ff41';
                ctx.fillRect(seg.x*cell + 2, seg.y*cell + 2, cell-4, cell-4);
            });
            ctx.shadowBlur = 0;

            // Food
            if (food) {
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 8;
                ctx.fillRect(food.x*cell + 5, food.y*cell + 5, cell-10, cell-10);
            }

            // Special Mouse
            if (specialMouse) {
                ctx.fillStyle = '#ff00ff';
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 15;
                ctx.fillRect(specialMouse.x*cell + 4, specialMouse.y*cell + 4, cell-8, cell-8);
            }
            ctx.shadowBlur = 0;

            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = currentLevel;
            document.getElementById('timer').textContent = `\( {String(Math.floor(elapsed/60)).padStart(2,'0')}: \){String(elapsed%60).padStart(2,'0')}`;
            document.getElementById('target-score').textContent = 200 + currentLevel * 100;
        }

        function gameOver() {
            gameState = 'over';
            playSound(400, 0.6, 'sawtooth', 0.5);
            const isNewRecord = score > highScore;
            if (isNewRecord) {
                highScore = score;
                playSound(800, 0.2); playSound(1100, 0.3); playSound(1400, 0.4);
            }
            saveProgress();
            document.getElementById('go-score').textContent = score;
            document.getElementById('new-record-text').style.display = isNewRecord ? 'block' : 'none';
            document.getElementById('gameover-overlay').classList.add('active');
        }

        function victory() {
            gameState = 'victory';
            playSound(700,0.2); playSound(900,0.2); playSound(1200,0.4);
            const isNewRecord = score > highScore;
            if (isNewRecord) {
                highScore = score;
                playSound(1000,0.3); playSound(1300,0.4);
            }
            saveProgress();

            // Unlock next level
            if (!unlockedLevels.includes(currentLevel + 1) && currentLevel < 10) {
                unlockedLevels.push(currentLevel + 1);
                saveProgress();
            }

            document.getElementById('vic-score').textContent = score;
            document.getElementById('new-record-text-vic').style.display = isNewRecord ? 'block' : 'none';
            document.getElementById('victory-overlay').classList.add('active');
        }

        function setupControls() {
            const changeDir = (newDx, newDy) => {
                if (gameState === 'playing' && !(dx === -newDx && dy === -newDy)) {
                    dx = newDx; dy = newDy;
                }
            };
            document.getElementById('up').onclick = () => changeDir(0,-1);
            document.getElementById('down').onclick = () => changeDir(0,1);
            document.getElementById('left').onclick = () => changeDir(-1,0);
            document.getElementById('right').onclick = () => changeDir(1,0);
        }

        function buildLevels() {
            const grid = document.getElementById('levels-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const card = document.createElement('div');
                card.className = 'level-card';
                if (!unlockedLevels.includes(i)) card.classList.add('locked');
                card.innerHTML = `<b>Level ${i}</b>`;
                card.onclick = () => {
                    document.getElementById('levels-screen').classList.remove('active');
                    document.getElementById('game-screen').classList.add('active');
                    initLevel(i);
                };
                grid.appendChild(card);
            }
        }

        // Button Events...
        document.getElementById('start-btn').onclick = () => {
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            initLevel(1);
        };

        document.getElementById('levels-menu-btn').onclick = () => {
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('levels-screen').classList.add('active');
            buildLevels();
        };

        document.getElementById('back-to-home').onclick = () => {
            document.getElementById('levels-screen').classList.remove('active');
            document.getElementById('home-screen').classList.add('active');
        };

        document.getElementById('pause-btn').onclick = () => {
            if (gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pause-overlay').classList.add('active');
            }
        };

        document.getElementById('resume-btn').onclick = () => {
            document.getElementById('pause-overlay').classList.remove('active');
            gameState = 'playing';
            lastTick = Date.now();
            requestAnimationFrame(gameLoop);
        };

        document.getElementById('retry-btn').onclick = () => {
            document.getElementById('gameover-overlay').classList.remove('active');
            initLevel(currentLevel);
        };

        document.getElementById('next-btn').onclick = () => {
            document.getElementById('victory-overlay').classList.remove('active');
            initLevel(Math.min(currentLevel + 1, 10));
        };

        document.getElementById('quit-btn').onclick = 
        document.getElementById('gohome1').onclick = 
        document.getElementById('gohome2').onclick = () => location.reload();

        document.addEventListener('keydown', e => {
            if (gameState !== 'playing') return;
            switch(e.key) {
                case 'ArrowUp': case 'w': dx=0; dy=-1; break;
                case 'ArrowDown': case 's': dx=0; dy=1; break;
                case 'ArrowLeft': case 'a': dx=-1; dy=0; break;
                case 'ArrowRight': case 'd': dx=1; dy=0; break;
            }
        });

        window.onload = () => {
            loadProgress();
            resize();
            setupControls();
            setTimeout(() => {
                document.getElementById('loading-screen').classList.remove('active');
                document.getElementById('home-screen').classList.add('active');
            }, 1300);
        };
    </script>
</body>
</html>
