<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GO ON ARROW</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    overflow:hidden;
    background:#050510;
    touch-action:none;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
    background:
    radial-gradient(circle at top,#13203f 0%,#070912 45%,#010103 100%);
}

#ui{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:10;
    pointer-events:none;
}

.panel{
    display:flex;
    gap:12px;
    align-items:center;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.1);
    padding:10px 16px;
    border-radius:18px;
    box-shadow:0 0 25px rgba(0,255,255,.15);
}

.uiText{
    color:white;
    font-size:15px;
    font-weight:bold;
    text-shadow:0 0 10px currentColor;
}

#pauseBtn{
    pointer-events:auto;
    border:none;
    background:#00e5ff;
    color:#00141a;
    font-size:13px;
    font-weight:bold;
    padding:8px 14px;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 0 20px #00e5ff;
}

#pauseBtn.used{
    background:#555;
    color:#aaa;
    box-shadow:none;
}

.overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:rgba(0,0,0,.55);
    backdrop-filter:blur(8px);
    z-index:50;
}

.hidden{
    display:none;
}

.title{
    font-size:60px;
    font-weight:900;
    color:#00e5ff;
    letter-spacing:3px;
    text-shadow:
    0 0 10px #00e5ff,
    0 0 30px #00e5ff,
    0 0 60px #00e5ff;
    animation:pulse 2s infinite;
    text-align:center;
}

.sub{
    margin-top:12px;
    color:white;
    opacity:.85;
    font-size:18px;
}

.btn{
    margin-top:24px;
    padding:14px 28px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:#00e5ff;
    color:#00141a;
    font-size:16px;
    font-weight:bold;
    box-shadow:0 0 25px #00e5ff;
}

#levelPopup{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:60;
    pointer-events:none;
    background:rgba(0,0,0,.2);
    backdrop-filter:blur(4px);
}

#popupText{
    font-size:58px;
    font-weight:900;
    color:#00e5ff;
    text-shadow:
    0 0 12px #00e5ff,
    0 0 35px #00e5ff,
    0 0 70px #00e5ff;
    animation:pop .7s ease;
}

.warning{
    animation:warn .7s infinite;
}

@keyframes warn{
    0%,100%{
        color:white;
    }
    50%{
        color:#ff4466;
    }
}

@keyframes pulse{
    0%,100%{
        filter:brightness(1);
    }
    50%{
        filter:brightness(1.4);
    }
}

@keyframes pop{
    0%{
        transform:scale(.3);
        opacity:0;
    }
    50%{
        transform:scale(1.2);
        opacity:1;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">

    <div class="panel">
        <div class="uiText" id="levelText">LEVEL 1</div>
        <div class="uiText" id="lifeText">❤️❤️❤️❤️❤️</div>
        <div class="uiText" id="timerText">60</div>
    </div>

    <button id="pauseBtn">PAUSE</button>

</div>

<div class="overlay" id="home">
    <div class="title">GO ON ARROW</div>
    <div class="sub">Neon Cyberpunk Puzzle Game</div>
    <button class="btn" id="startBtn">START GAME</button>
    <div class="sub" id="bestText"></div>
</div>

<div class="overlay hidden" id="pauseMenu">
    <div class="title" style="font-size:45px;">PAUSED</div>
    <button class="btn" id="resumeBtn">RESUME</button>
</div>

<div class="overlay hidden" id="gameOver">
    <div class="title" style="color:#ff4466;">GAME OVER</div>
    <div class="sub" id="finalLevel"></div>
    <button class="btn" onclick="location.reload()">RESTART</button>
</div>

<div id="levelPopup" class="hidden">
    <div id="popupText">LEVEL UP 🎊</div>
    <div class="sub">Congratulations!</div>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let width,height;

function resize(){
    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = width;
    canvas.height = height;
}

resize();
window.addEventListener("resize",resize);

const themes = [
    ["#00e5ff","#0088ff"],
    ["#ff00ea","#ff4477"],
    ["#00ff99","#88ff00"],
    ["#ff8800","#ff3300"],
    ["#aa66ff","#ff66ff"]
];

let arrows = [];
let obstacles = [];
let particles = [];
let powerups = [];

let level = 1;
let lives = 5;
let timer = 60;

let paused = false;
let pauseUsed = false;
let gameStarted = false;

let shake = 0;
let slowMotion = 1;

const levelText = document.getElementById("levelText");
const lifeText = document.getElementById("lifeText");
const timerText = document.getElementById("timerText");

document.getElementById("bestText").innerHTML =
"BEST LEVEL : " + (localStorage.bestArrowLevel || 1);

class Arrow{

    constructor(x,y,dir,size,color){
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.size = size;
        this.color = color;
        this.speed = 2 + level * 0.05;
        this.moving = false;
        this.done = false;
    }

    update(){

        if(!this.moving) return;

        const moveSpeed = this.speed * slowMotion;

        if(this.dir==="up") this.y -= moveSpeed;
        if(this.dir==="down") this.y += moveSpeed;
        if(this.dir==="left") this.x -= moveSpeed;
        if(this.dir==="right") this.x += moveSpeed;

        particles.push(new Particle(this.x,this.y,this.color));

        for(let obstacle of obstacles){

            if(
                this.x > obstacle.x &&
                this.x < obstacle.x + obstacle.w &&
                this.y > obstacle.y &&
                this.y < obstacle.y + obstacle.h
            ){
                fail();
            }

        }

        for(let arrow of arrows){

            if(arrow !== this){

                const distance = Math.hypot(
                    this.x - arrow.x,
                    this.y - arrow.y
                );

                if(distance < (this.size + arrow.size) * 0.45){
                    fail();
                }

            }

        }

        for(let p of powerups){

            const d = Math.hypot(
                this.x - p.x,
                this.y - p.y
            );

            if(d < 35){
                p.collect();
            }

        }

        if(
            this.x < -120 ||
            this.x > width + 120 ||
            this.y < -120 ||
            this.y > height + 120
        ){
            this.done = true;
        }

    }

    draw(){

        ctx.save();

        ctx.translate(this.x,this.y);

        if(this.dir==="up") ctx.rotate(-Math.PI/2);
        if(this.dir==="down") ctx.rotate(Math.PI/2);
        if(this.dir==="left") ctx.rotate(Math.PI);

        ctx.shadowBlur = 25;
        ctx.shadowColor = this.color;

        for(let i=4;i>=1;i--){

            ctx.globalAlpha = 0.08;

            ctx.fillStyle = this.color;

            ctx.fillRect(
                -this.size*0.7 - i*2,
                -this.size*0.3,
                this.size*1.2,
                this.size*0.6
            );

        }

        ctx.globalAlpha = 1;

        ctx.fillStyle = this.color;

        ctx.beginPath();

        ctx.moveTo(-this.size*0.7,-this.size*0.4);
        ctx.lineTo(this.size*0.25,-this.size*0.4);
        ctx.lineTo(this.size*0.25,-this.size*0.7);
        ctx.lineTo(this.size,0);
        ctx.lineTo(this.size*0.25,this.size*0.7);
        ctx.lineTo(this.size*0.25,this.size*0.4);
        ctx.lineTo(-this.size*0.7,this.size*0.4);

        ctx.closePath();
        ctx.fill();

        ctx.restore();

    }

}

class Obstacle{

    constructor(x,y,w,h){
        this.x = x;
        this.y = y;
        this.w = w;
        this.h = h;
    }

    draw(){

        ctx.fillStyle = "rgba(255,255,255,.08)";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ffffff";

        ctx.fillRect(this.x,this.y,this.w,this.h);

    }

}

class Particle{

    constructor(x,y,color){

        this.x = x;
        this.y = y;

        this.vx = (Math.random()-0.5)*6;
        this.vy = (Math.random()-0.5)*6;

        this.life = 1;
        this.color = color;

    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.985;
        this.vy *= 0.985;

        this.life -= 0.02;

    }

    draw(){

        ctx.globalAlpha = this.life;

        ctx.fillStyle = this.color;

        ctx.beginPath();
        ctx.arc(this.x,this.y,3,0,Math.PI*2);
        ctx.fill();

        ctx.globalAlpha = 1;

    }

}

class Powerup{

    constructor(x,y,type){

        this.x = x;
        this.y = y;
        this.type = type;
        this.float = 0;

    }

    collect(){

        if(this.type==="time"){
            timer += 25;
        }

        if(this.type==="life"){
            lives = Math.min(5,lives+1);
        }

        if(this.type==="slow"){

            slowMotion = 0.4;

            setTimeout(()=>{
                slowMotion = 1;
            },5000);

        }

        burst(this.x,this.y,"#ffffff");

        powerups = powerups.filter(p=>p!==this);

    }

    draw(){

        this.float += 0.05;

        ctx.save();

        ctx.translate(
            this.x,
            this.y + Math.sin(this.float)*5
        );

        ctx.fillStyle = "#ffffff";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ffffff";

        ctx.font = "32px Arial";
        ctx.textAlign = "center";

        if(this.type==="time") ctx.fillText("+",0,0);
        if(this.type==="life") ctx.fillText("♥",0,0);
        if(this.type==="slow") ctx.fillText("⏳",0,0);

        ctx.restore();

    }

}

function createLevel(){

    arrows = [];
    obstacles = [];
    powerups = [];

    const theme =
    themes[Math.floor((level-1)/10) % themes.length];

    let arrowCount = Math.min(
        5 + Math.floor(level*0.5),
        20
    );

    for(let i=0;i<arrowCount;i++){

        const directions = [
            "up",
            "down",
            "left",
            "right"
        ];

        arrows.push(
            new Arrow(
                random(100,width-100),
                random(140,height-100),
                directions[Math.floor(Math.random()*4)],
                random(24,40),
                theme[Math.floor(Math.random()*theme.length)]
            )
        );

    }

    let obstacleCount = Math.min(
        Math.floor(level/2),
        8
    );

    for(let i=0;i<obstacleCount;i++){

        obstacles.push(
            new Obstacle(
                random(80,width-200),
                random(120,height-180),
                random(70,180),
                random(20,80)
            )
        );

    }

    if(level > 4){

        const types = [
            "time",
            "life",
            "slow"
        ];

        powerups.push(
            new Powerup(
                random(100,width-100),
                random(140,height-100),
                types[Math.floor(Math.random()*3)]
            )
        );

    }

    timer = Math.max(
        20,
        60 - Math.floor(level*0.5)
    );

    updateUI();

}

function updateUI(){

    levelText.innerHTML = "LEVEL " + level;

    lifeText.innerHTML = "❤️".repeat(lives);

    timerText.innerHTML = Math.ceil(timer);

    if(timer < 10){
        timerText.classList.add("warning");
    }else{
        timerText.classList.remove("warning");
    }

}

function burst(x,y,color){

    for(let i=0;i<30;i++){
        particles.push(new Particle(x,y,color));
    }

}

function fail(){

    shake = 20;

    burst(width/2,height/2,"#ff3355");

    loseLife();

    createLevel();

}

function loseLife(){

    lives--;

    if(lives <= 0){
        gameOver();
    }

}

function gameOver(){

    paused = true;

    document.getElementById("gameOver")
    .classList.remove("hidden");

    document.getElementById("finalLevel")
    .innerHTML = "HIGHEST LEVEL : " + level;

}

function showLevelUp(){

    const popup =
    document.getElementById("levelPopup");

    popup.classList.remove("hidden");

    burst(width/2,height/2,"#00e5ff");

    setTimeout(()=>{
        popup.classList.add("hidden");
    },1500);

}

function drawGrid(){

    ctx.strokeStyle = "rgba(255,255,255,.05)";

    for(let x=0;x<width;x+=40){

        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,height);
        ctx.stroke();

    }

    for(let y=0;y<height;y+=40){

        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(width,y);
        ctx.stroke();

    }

}

function gameLoop(){

    requestAnimationFrame(gameLoop);

    if(!gameStarted || paused) return;

    ctx.clearRect(0,0,width,height);

    shake *= 0.85;

    ctx.save();

    ctx.translate(
        (Math.random()-0.5)*shake,
        (Math.random()-0.5)*shake
    );

    drawGrid();

    for(let obstacle of obstacles){
        obstacle.draw();
    }

    for(let powerup of powerups){
        powerup.draw();
    }

    for(let arrow of arrows){
        arrow.update();
        arrow.draw();
    }

    for(let particle of particles){
        particle.update();
        particle.draw();
    }

    particles = particles.filter(
        p=>p.life > 0
    );

    ctx.restore();

    arrows = arrows.filter(a=>!a.done);

    if(arrows.length===0){

        level++;

        localStorage.bestArrowLevel =
        Math.max(
            level,
            Number(localStorage.bestArrowLevel || 1)
        );

        showLevelUp();

        setTimeout(()=>{
            createLevel();
        },700);

    }

    timer -= 0.016;

    if(timer <= 0){

        loseLife();

        createLevel();

    }

    updateUI();

}

canvas.addEventListener("click",e=>{

    if(!gameStarted) return;

    const rect =
    canvas.getBoundingClientRect();

    const mouseX =
    e.clientX - rect.left;

    const mouseY =
    e.clientY - rect.top;

    for(let powerup of powerups){

        const d = Math.hypot(
            mouseX - powerup.x,
            mouseY - powerup.y
        );

        if(d < 40){
            powerup.collect();
            return;
        }

    }

    for(let arrow of arrows){

        if(!arrow.moving){

            const d = Math.hypot(
                mouseX - arrow.x,
                mouseY - arrow.y
            );

            if(d < arrow.size){

                arrow.moving = true;

                shake = 5;

                burst(
                    arrow.x,
                    arrow.y,
                    arrow.color
                );

                break;

            }

        }

    }

});

document.getElementById("startBtn")
.onclick = ()=>{

    document.getElementById("home")
    .classList.add("hidden");

    gameStarted = true;

    createLevel();

};

document.getElementById("pauseBtn")
.onclick = ()=>{

    if(pauseUsed) return;

    pauseUsed = true;

    paused = true;

    document.getElementById("pauseBtn")
    .classList.add("used");

    document.getElementById("pauseMenu")
    .classList.remove("hidden");

};

document.getElementById("resumeBtn")
.onclick = ()=>{

    paused = false;

    document.getElementById("pauseMenu")
    .classList.add("hidden");

};

function random(min,max){
    return Math.random()*(max-min)+min;
}

gameLoop();

</script>

</body>
</html>
