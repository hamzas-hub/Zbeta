<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GO ON ARROW</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
overflow:hidden;
background:#02040a;
touch-action:none;
}

canvas{
display:block;
background:
radial-gradient(circle at top,#101a38 0%,#05060d 45%,#010103 100%);
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:20;
pointer-events:none;
}

.panel{
display:flex;
align-items:center;
gap:10px;
padding:8px 14px;
border-radius:16px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.12);
box-shadow:0 0 25px rgba(0,255,255,.15);
}

.uiText{
color:white;
font-weight:bold;
font-size:15px;
text-shadow:0 0 12px currentColor;
}

#pauseBtn{
pointer-events:auto;
padding:8px 14px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:13px;
font-weight:bold;
background:#00e5ff;
color:#00131a;
box-shadow:0 0 20px #00e5ff;
transition:.25s;
}

#pauseBtn.used{
background:#555;
color:#aaa;
box-shadow:none;
}

.overlay{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:rgba(0,0,0,.5);
backdrop-filter:blur(8px);
z-index:50;
}

.hidden{
display:none;
}

.title{
font-size:58px;
font-weight:900;
letter-spacing:3px;
color:#00e5ff;
text-shadow:
0 0 10px #00e5ff,
0 0 30px #00e5ff,
0 0 60px #00e5ff;
animation:pulse 2s infinite;
text-align:center;
}

.sub{
margin-top:12px;
color:white;
opacity:.85;
font-size:18px;
}

.btn{
margin-top:28px;
padding:14px 28px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:#00e5ff;
color:#00131a;
box-shadow:0 0 25px #00e5ff;
transition:.25s;
}

.btn:hover{
transform:scale(1.05);
}

#levelPopup{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
pointer-events:none;
z-index:100;
background:rgba(0,0,0,.18);
backdrop-filter:blur(4px);
}

#popupText{
font-size:60px;
font-weight:900;
color:#00e5ff;
text-shadow:
0 0 12px #00e5ff,
0 0 35px #00e5ff,
0 0 70px #00e5ff;
animation:pop .8s ease;
}

.warning{
animation:warn .7s infinite;
}

@keyframes warn{
0%,100%{
color:white;
}
50%{
color:#ff3d6e;
}
}

@keyframes pulse{
0%,100%{
filter:brightness(1);
}
50%{
filter:brightness(1.4);
}
}

@keyframes pop{
0%{
transform:scale(.3);
opacity:0;
}
50%{
transform:scale(1.2);
opacity:1;
}
100%{
transform:scale(1);
opacity:1;
}
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">

<div class="panel">
<div class="uiText" id="levelText">LEVEL 1</div>
<div class="uiText" id="lifeText">❤️❤️❤️❤️❤️</div>
<div class="uiText" id="timerText">60</div>
</div>

<button id="pauseBtn">PAUSE</button>

</div>

<div class="overlay" id="home">

<div class="title">GO ON ARROW</div>

<div class="sub">
Neon Cyberpunk Puzzle Game
</div>

<button class="btn" id="startBtn">
START GAME
</button>

<div class="sub" id="bestText"></div>

</div>

<div class="overlay hidden" id="pauseMenu">

<div class="title" style="font-size:46px;">
PAUSED
</div>

<button class="btn" id="resumeBtn">
RESUME
</button>

</div>

<div class="overlay hidden" id="gameOver">

<div class="title" style="color:#ff4466;">
GAME OVER
</div>

<div class="sub" id="finalLevel"></div>

<button class="btn" onclick="location.reload()">
RESTART
</button>

</div>

<div id="levelPopup" class="hidden">

<div id="popupText">
LEVEL UP 🎊
</div>

<div class="sub">
Congratulations!
</div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w,h,dpr;

function resize(){

dpr = window.devicePixelRatio || 1;

w = innerWidth;
h = innerHeight;

canvas.width = w * dpr;
canvas.height = h * dpr;

canvas.style.width = w + "px";
canvas.style.height = h + "px";

ctx.setTransform(1,0,0,1,0,0);
ctx.scale(dpr,dpr);

}

resize();

window.addEventListener("resize",resize);

const themes = [
["#00e5ff","#0088ff"],
["#ff00ea","#ff4d7a"],
["#00ff99","#9cff00"],
["#ff8a00","#ff3300"],
["#b266ff","#ff66ff"]
];

let arrows = [];
let obstacles = [];
let particles = [];
let powerups = [];

let level = 1;
let lives = 5;
let timer = 60;

let paused = false;
let pauseUsed = false;
let gameStarted = false;

let shake = 0;
let slowMotion = 1;
let transitionAlpha = 1;

const ui = {
level:document.getElementById("levelText"),
life:document.getElementById("lifeText"),
timer:document.getElementById("timerText")
};

document.getElementById("bestText").innerHTML =
"BEST LEVEL : " + (localStorage.bestArrowLevel || 1);

class Arrow{

constructor(x,y,dir,size,color){

this.x = x;
this.y = y;
this.dir = dir;
this.size = size;
this.color = color;

this.speed = 2.2 + (level * .05);

this.moving = false;

}

update(){

if(!this.moving) return;

let speed = this.speed * slowMotion;

if(this.dir==="up") this.y -= speed;
if(this.dir==="down") this.y += speed;
if(this.dir==="left") this.x -= speed;
if(this.dir==="right") this.x += speed;

particles.push(
new Particle(this.x,this.y,this.color)
);

for(let o of obstacles){

if(
this.x > o.x &&
this.x < o.x + o.w &&
this.y > o.y &&
this.y < o.y + o.h
){
fail();
}

}

for(let a of arrows){

if(a !== this){

if(
Math.hypot(this.x-a.x,this.y-a.y)
< (this.size + a.size) * .45
){
fail();
}

}

}

for(let p of powerups){

if(
Math.hypot(this.x-p.x,this.y-p.y)
< 40
){
p.collect();
}

}

if(
this.x < -100 ||
this.x > w + 100 ||
this.y < -100 ||
this.y > h + 100
){
this.done = true;
}

}

draw(){

ctx.save();

ctx.translate(this.x,this.y);

if(this.dir==="up") ctx.rotate(-Math.PI/2);
if(this.dir==="down") ctx.rotate(Math.PI/2);
if(this.dir==="left") ctx.rotate(Math.PI);

ctx.globalCompositeOperation = "lighter";

ctx.shadowBlur = 25;
ctx.shadowColor = this.color;

for(let i=4;i>=1;i--){

ctx.globalAlpha = .08;

ctx.fillStyle = this.color;

ctx.fillRect(
-this.size*.7-(i*2),
-this.size*.3,
this.size*1.2,
this.size*.6
);

}

ctx.globalAlpha = 1;

ctx.fillStyle = this.color;

ctx.beginPath();

ctx.moveTo(-this.size*.7,-this.size*.4);
ctx.lineTo(this.size*.25,-this.size*.4);
ctx.lineTo(this.size*.25,-this.size*.7);
ctx.lineTo(this.size,0);
ctx.lineTo(this.size*.25,this.size*.7);
ctx.lineTo(this.size*.25,this.size*.4);
ctx.lineTo(-this.size*.7,this.size*.4);

ctx.closePath();

ctx.fill();

ctx.restore();

}

}

class Obstacle{

constructor(x,y,wid,hei){

this.x = x;
this.y = y;
this.w = wid;
this.h = hei;

}

draw(){

ctx.fillStyle = "rgba(255,255,255,.08)";

ctx.shadowBlur = 15;
ctx.shadowColor = "#fff";

ctx.fillRect(this.x,this.y,this.w,this.h);

}

}

class Particle{

constructor(x,y,color){

this.x = x;
this.y = y;

this.vx = (Math.random()-.5)*6;
this.vy = (Math.random()-.5)*6;

this.life = 1;

this.color = color;

}

update(){

this.x += this.vx;
this.y += this.vy;

this.vx *= .985;
this.vy *= .985;

this.life -= .02;

}

draw(){

ctx.globalAlpha = this.life;

ctx.fillStyle = this.color;

ctx.beginPath();

ctx.arc(this.x,this.y,3,0,Math.PI*2);

ctx.fill();

ctx.globalAlpha = 1;

}

}

class Powerup{

constructor(x,y,type){

this.x = x;
this.y = y;
this.type = type;

this.t = 0;

}

collect(){

if(this.type==="time"){
timer += 25;
}

if(this.type==="life"){
lives = Math.min(5,lives+1);
}

if(this.type==="slow"){

slowMotion = .4;

setTimeout(()=>{
slowMotion = 1;
},5000);

}

burst(this.x,this.y,"#fff");

powerups.splice(
powerups.indexOf(this),
1
);

}

draw(){

this.t += .05;

ctx.save();

ctx.translate(
this.x,
this.y + Math.sin(this.t)*5
);

ctx.shadowBlur = 20;
ctx.shadowColor = "#fff";

ctx.fillStyle = "#fff";

ctx.font = "34px Arial";
ctx.textAlign = "center";

if(this.type==="time") ctx.fillText("+",0,0);
if(this.type==="life") ctx.fillText("♥",0,0);
if(this.type==="slow") ctx.fillText("⏳",0,0);

ctx.restore();

}

}

function createLevel(){

arrows = [];
obstacles = [];
powerups = [];

let theme =
themes[
Math.floor((level-1)/10)
% themes.length
];

let arrowCount =
Math.min(5 + Math.floor(level*.5),20);

for(let i=0;i<arrowCount;i++){

let dirs = [
"up",
"down",
"left",
"right"
];

arrows.push(
new Arrow(
rand(100,w-100),
rand(120,h-100),
dirs[Math.floor(Math.random()*4)],
rand(22,42),
theme[
Math.floor(
Math.random()*theme.length
)
]
)
);

}

let obsCount =
Math.min(Math.floor(level/2),8);

for(let i=0;i<obsCount;i++){

obstacles.push(
new Obstacle(
rand(80,w-200),
rand(120,h-180),
rand(70,180),
rand(20,80)
)
);

}

if(level > 4){

let types = [
"time",
"life",
"slow"
];

powerups.push(
new Powerup(
rand(100,w-100),
rand(120,h-100),
types[
Math.floor(Math.random()*3)
]
)
);

}

timer =
Math.max(20,60-Math.floor(level*.5));

transitionAlpha = 1;

updateUI();

}

function updateUI(){

ui.level.innerHTML =
"LEVEL " + level;

ui.life.innerHTML =
"❤️".repeat(lives);

ui.timer.innerHTML =
Math.ceil(timer);

if(timer < 10){

ui.timer.classList.add("warning");

}else{

ui.timer.classList.remove("warning");

}

}

function burst(x,y,color){

for(let i=0;i<30;i++){

particles.push(
new Particle(x,y,color)
);

}

}

function showLevelUp(){

const popup =
document.getElementById("levelPopup");

popup.classList.remove("hidden");

shake = 10;

burst(w/2,h/2,"#00e5ff");

playLevelSound();

setTimeout(()=>{
popup.classList.add("hidden");
},1500);

}

function playLevelSound(){

try{

const audioCtx =
new(
window.AudioContext ||
window.webkitAudioContext
)();

const osc =
audioCtx.createOscillator();

const gain =
audioCtx.createGain();

osc.connect(gain);

gain.connect(audioCtx.destination);

osc.type = "triangle";

osc.frequency.setValueAtTime(
300,
audioCtx.currentTime
);

osc.frequency.linearRampToValueAtTime(
700,
audioCtx.currentTime + .3
);

gain.gain.setValueAtTime(
.08,
audioCtx.currentTime
);

gain.gain.exponentialRampToValueAtTime(
0.001,
audioCtx.currentTime + .5
);

osc.start();

osc.stop(audioCtx.currentTime + .5);

}catch(e){}

}

function fail(){

shake = 22;

burst(w/2,h/2,"#ff3355");

loseLife();

createLevel();

}

function loseLife(){

lives--;

if(lives <= 0){

gameOver();

}

}

function gameOver(){

paused = true;

document
.getElementById("gameOver")
.classList.remove("hidden");

document
.getElementById("finalLevel")
.innerHTML =
"HIGHEST LEVEL : " + level;

}

function drawGrid(){

ctx.strokeStyle =
"rgba(255,255,255,.05)";

for(let x=0;x<w;x+=40){

ctx.beginPath();

ctx.moveTo(x,0);

ctx.lineTo(x,h);

ctx.stroke();

}

for(let y=0;y<h;y+=40){

ctx.beginPath();

ctx.moveTo(0,y);

ctx.lineTo(w,y);

ctx.stroke();

}

}

function gameLoop(){

requestAnimationFrame(gameLoop);

if(!gameStarted || paused) return;

ctx.clearRect(0,0,w,h);

if(transitionAlpha > 0){

ctx.fillStyle =
`rgba(0,0,0,${transitionAlpha})`;

ctx.fillRect(0,0,w,h);

transitionAlpha -= .02;

}

shake *= .82;

ctx.save();

ctx.translate(
(Math.random()-.5)*shake,
(Math.random()-.5)*shake
);

drawGrid();

for(let o of obstacles){
o.draw();
}

for(let p of powerups){
p.draw();
}

for(let a of arrows){

a.update();

a.draw();

}

for(let p of particles){

p.update();

p.draw();

}

particles =
particles.filter(p=>p.life>0);

ctx.restore();

arrows =
arrows.filter(a=>!a.done);

if(arrows.length===0){

level++;

localStorage.bestArrowLevel =
Math.max(
level,
localStorage.bestArrowLevel || 1
);

showLevelUp();

setTimeout(()=>{
createLevel();
},700);

}

timer -= .016;

if(timer <= 0){

loseLife();

createLevel();

}

updateUI();

}

canvas.addEventListener("click",e=>{

if(!gameStarted) return;

const rect =
canvas.getBoundingClientRect();

const mx =
e.clientX - rect.left;

const my =
e.clientY - rect.top;

for(let p of powerups){

if(
Math.hypot(mx-p.x,my-p.y)
< 40
){
p.collect();
return;
}

}

for(let a of arrows){

if(!a.moving){

if(
Math.hypot(mx-a.x,my-a.y)
< a.size
){

a.moving = true;

shake = 4;

burst(a.x,a.y,a.color);

break;

}

}

}

});

document
.getElementById("startBtn")
.onclick = ()=>{

document
.getElementById("home")
.classList.add("hidden");

gameStarted = true;

createLevel();

};

document
.getElementById("pauseBtn")
.onclick = ()=>{

if(pauseUsed) return;

pauseUsed = true;

paused = true;

document
.getElementById("pauseBtn")
.classList.add("used");

document
.getElementById("pauseMenu")
.classList.remove("hidden");

};

document
.getElementById("resumeBtn")
.onclick = ()=>{

paused = false;

document
.getElementById("pauseMenu")
.classList.add("hidden");

};

function rand(min,max){
return Math.random()*(max-min)+min;
}

gameLoop();

</script>

</body>
</html>
