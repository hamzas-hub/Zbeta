<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GO ON ARROW</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #00ffff;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        
        #container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #00ffff;
            box-shadow: 0 0 50px #00ffff, inset 0 0 40px rgba(0,255,255,0.2);
            overflow: hidden;
            border-radius: 4px;
        }
        
        canvas {
            display: block;
            background: #111111;
        }
        
        #ui {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 20;
            font-size: 13px;
            text-shadow: 0 0 12px #00ffff;
        }
        
        .neon-text {
            text-shadow: 0 0 10px #fff, 0 0 20px #00ffff, 0 0 40px #00ffff;
        }
        
        button {
            background: transparent;
            color: #00ffff;
            border: 3px solid #00ffff;
            padding: 8px 18px;
            font-family: 'Press Start 2P', system-ui;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px #00ffff;
            pointer-events: all;
        }
        
        button:hover {
            background: #00ffff;
            color: #111;
            box-shadow: 0 0 35px #00ffff;
        }
        
        #pause-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 30;
        }
        
        .glass {
            background: rgba(15,15,35,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,255,0.3);
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas" width="800" height="600"></canvas>
        
        <!-- Top UI -->
        <div id="ui" class="glass">
            <div>LVL <span id="level-display">1</span></div>
            <div id="lives-display" style="font-size:22px;">❤️❤️❤️❤️❤️</div>
            <div>TIME <span id="time-display" style="color:#ffff00;">90</span></div>
        </div>
        
        <button id="pause-btn" onclick="pauseGame()">PAUSE</button>

        <!-- Home Screen -->
        <div id="home-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(5,5,15,0.97); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100;">
            <h1 class="neon-text" style="font-size:58px; color:#ff00ff; margin:0; letter-spacing:12px;">GO ON</h1>
            <h1 class="neon-text" style="font-size:58px; color:#00ffff; margin:-20px 0 30px 0; letter-spacing:12px;">ARROW</h1>
            <button onclick="startGame()" style="font-size:26px; padding:24px 70px; margin-bottom:40px;">START GAME</button>
            <div id="best-score" style="color:#ffaa00; font-size:15px;">BEST: LEVEL 0</div>
        </div>
        
        <!-- Game Over -->
        <div id="game-over-screen" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,5,15,0.96); flex-direction:column; justify-content:center; align-items:center; z-index:110;">
            <h1 style="color:#ff0066; font-size:52px; margin-bottom:10px;">GAME OVER</h1>
            <p id="final-level-text" style="color:#ff88aa; font-size:22px; margin:10px 0 30px;">REACHED LEVEL 1</p>
            <button onclick="restartGame()" style="font-size:22px; padding:18px 55px;">PLAY AGAIN</button>
        </div>
        
        <!-- Pause -->
        <div id="pause-overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,10,35,0.92); justify-content:center; align-items:center; flex-direction:column; z-index:120;">
            <h2 style="color:#ffff00; font-size:42px; margin-bottom:10px;">PAUSED</h2>
            <button onclick="resumeGame()" style="font-size:20px;">RESUME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'home';
        let currentLevel = 1;
        let lives = 5;
        let timeLeft = 90;
        let timerInterval = null;
        let hasUsedPause = false;
        let highScore = 0;
        
        let arrows = [];
        let obstacles = [];
        let powerUps = [];
        let launchedArrows = [];
        let particles = [];
        let shake = 0;
        let themeColor = '#00ffff';
        let themeIndex = 0;
        
        let camera = { scale: 1, offsetX: 0, offsetY: 0 };
        let lastTouchDistance = 0;
        
        const themes = ['#00ffff', '#ff00ff', '#00ff88', '#ffaa00', '#cc00ff'];
        
        let audioCtx;
        
        class Arrow {
            constructor(x, y, angle) {
                this.x = x; this.y = y; this.angle = angle;
                this.launched = false;
                this.speed = 5.2;
                this.trail = [];
                this.size = 21 + Math.random() * 11;
            }
        }
        
        class Particle {
            constructor(x, y, color, life = 48) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15 - 2;
                this.life = life;
                this.maxLife = life;
                this.color = color;
                this.size = Math.random() * 7 + 4;
                this.gravity = 0.25;
                this.friction = 0.975;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.size *= 0.968;
            }
        }
        
        class PowerUp {
            constructor(x, y, type) {
                this.x = x; this.y = y;
                this.type = type;
                this.pulse = Math.random() * Math.PI * 2;
                this.radius = 19;
                this.floatY = 0;
            }
        }
        
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            switch(type) {
                case 'launch':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(820 + Math.random()*320, audioCtx.currentTime);
                    gain.gain.value = 0.32;
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                    break;
                case 'collision':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(45, audioCtx.currentTime + 0.7);
                    gain.gain.value = 0.8;
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.75);
                    break;
                case 'levelup':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(1480, audioCtx.currentTime + 1);
                    gain.gain.value = 0.5;
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.3);
                    break;
                case 'powerup':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(1100, audioCtx.currentTime);
                    gain.gain.value = 0.45;
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                    break;
            }
            osc.connect(filter).connect(gain).connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.4);
        }
        
        function createExplosion(x, y, intensity = 1) {
            for (let i = 0; i < 42 * intensity; i++) {
                particles.push(new Particle(x, y, themeColor, 42));
            }
            for (let i = 0; i < 26 * intensity; i++) {
                particles.push(new Particle(x, y, '#ff3399', 36));
            }
        }
        
        function createLevelUpEffect() {
            for (let i = 0; i < 110; i++) {
                const p = new Particle(400, 280, '#ffff00', 70);
                p.vx *= 0.6; p.vy *= 0.6;
                particles.push(p);
            }
            playSound('levelup');
        }
        
        function loadHighScore() {
            const saved = localStorage.getItem('goonarrow_highscore');
            highScore = saved ? parseInt(saved) : 0;
            document.getElementById('best-score').textContent = `BEST: LEVEL ${highScore}`;
        }
        
        function saveHighScore() {
            if (currentLevel - 1 > highScore) {
                highScore = currentLevel - 1;
                localStorage.setItem('goonarrow_highscore', highScore);
                document.getElementById('best-score').textContent = `BEST: LEVEL ${highScore}`;
            }
        }
        
        function generateLevel(level) {
            arrows = []; obstacles = []; powerUps = []; launchedArrows = [];
            
            const numArrows = Math.min(5 + Math.floor(level / 2), 13);
            const numObstacles = level < 11 ? 3 : level < 21 ? 6 : 8;
            const numPowerUps = level > 4 ? (level > 15 ? 3 : 2) : 0;
            
            for (let i = 0; i < numArrows; i++) {
                let x = 120 + Math.random() * 560;
                let y = 105 + Math.random() * 390;
                const angle = [0, 90, 180, 270][Math.floor(Math.random() * 4)];
                const arrow = new Arrow(x, y, angle);
                arrow.speed = 5.1 + Math.min(level * 0.11, 3.5);
                arrows.push(arrow);
            }
            
            for (let i = 0; i < numObstacles; i++) {
                obstacles.push({
                    x: 140 + Math.random() * 520,
                    y: 120 + Math.random() * 360,
                    w: 48 + Math.random() * 95,
                    h: 42 + Math.random() * 75
                });
            }
            
            for (let i = 0; i < numPowerUps; i++) {
                powerUps.push(new PowerUp(
                    170 + Math.random() * 460,
                    150 + Math.random() * 300,
                    ['time','life','slow'][Math.floor(Math.random()*3)]
                ));
            }
            
            themeIndex = Math.floor((level - 1) / 10) % themes.length;
            themeColor = themes[themeIndex];
        }
        
        function drawBackground() {
            ctx.fillStyle = '#0a0a14';
            ctx.fillRect(0, 0, 800, 600);
            
            // Animated grid
            ctx.strokeStyle = 'rgba(0,255,255,0.12)';
            const offset = (Date.now() / 65) % 45;
            ctx.lineWidth = 1.5;
            for (let x = offset - 50; x < 850; x += 45) {
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,600); ctx.stroke();
            }
            for (let y = offset - 50; y < 650; y += 45) {
                ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(800,y); ctx.stroke();
            }
            
            // Subtle scanlines
            ctx.fillStyle = 'rgba(255,255,255,0.03)';
            for (let y = 0; y < 600; y += 4) {
                ctx.fillRect(0, y, 800, 1);
            }
        }
        
        function drawArrow(arrow) {
            ctx.save();
            ctx.translate(arrow.x, arrow.y);
            ctx.rotate(arrow.angle * Math.PI / 180);
            
            if (arrow.launched && arrow.trail.length > 3) {
                ctx.globalAlpha = 0.75;
                ctx.strokeStyle = themeColor;
                ctx.lineWidth = 14;
                ctx.shadowBlur = 35;
                ctx.shadowColor = themeColor;
                ctx.beginPath();
                arrow.trail.forEach((p,i) => i===0 ? ctx.moveTo(p.x-arrow.x, p.y-arrow.y) : ctx.lineTo(p.x-arrow.x, p.y-arrow.y));
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
            
            const s = arrow.size;
            ctx.shadowBlur = 40;
            ctx.shadowColor = '#ffffff';
            ctx.strokeStyle = themeColor;
            ctx.fillStyle = '#ffffff';
            ctx.lineWidth = 6;
            
            ctx.beginPath();
            ctx.moveTo(-s*0.95, 0);
            ctx.lineTo(s*0.9, 0);
            ctx.stroke();
            
            ctx.shadowBlur = 28;
            ctx.shadowColor = themeColor;
            ctx.beginPath();
            ctx.moveTo(s*0.9, 0);
            ctx.lineTo(s*0.38, -s*0.72);
            ctx.lineTo(s*0.38, s*0.72);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawPowerUps() {
            for (let pu of powerUps) {
                pu.pulse += 0.13;
                pu.floatY = Math.sin(pu.pulse) * 6;
                const r = pu.radius + Math.sin(pu.pulse) * 5;
                
                ctx.shadowBlur = 30;
                ctx.shadowColor = pu.type === 'life' ? '#00ff99' : pu.type === 'slow' ? '#ffcc00' : '#44ffff';
                ctx.fillStyle = ctx.shadowColor;
                ctx.beginPath();
                ctx.arc(pu.x, pu.y + pu.floatY, r, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = '#111';
                ctx.font = 'bold 20px Press Start 2P';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(pu.type === 'life' ? '♥' : pu.type === 'slow' ? '⏳' : '+', pu.x, pu.y + pu.floatY);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawObstacles() {
            ctx.shadowBlur = 22;
            ctx.shadowColor = '#ff3366';
            for (let o of obstacles) {
                ctx.fillStyle = '#1a0011';
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.strokeStyle = '#ff6699';
                ctx.lineWidth = 6;
                ctx.strokeRect(o.x+10, o.y+10, o.w-20, o.h-20);
            }
            ctx.shadowBlur = 0;
        }
        
        function drawParticles() {
            for (let p of particles) {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha * 0.95;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            for (let i = particles.length-1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i,1);
            }
            
            if (shake > 0.4) shake *= 0.88;
            else shake = 0;
            
            // Power-up collection
            for (let i = powerUps.length-1; i >= 0; i--) {
                const pu = powerUps[i];
                for (let a of arrows) {
                    if (!a.launched) continue;
                    if (Math.hypot(a.x - pu.x, a.y - pu.y) < 48) {
                        activatePowerUp(pu);
                        powerUps.splice(i,1);
                        break;
                    }
                }
            }
            
            let allDone = true;
            
            for (let i = arrows.length-1; i >= 0; i--) {
                const a = arrows[i];
                if (a.launched) {
                    const rad = a.angle * Math.PI / 180;
                    a.x += Math.cos(rad) * a.speed;
                    a.y += Math.sin(rad) * a.speed;
                    a.trail.push({x:a.x, y:a.y});
                    if (a.trail.length > 20) a.trail.shift();
                    
                    for (let obs of obstacles) {
                        if (a.x > obs.x-25 && a.x < obs.x+obs.w+25 && a.y > obs.y-25 && a.y < obs.y+obs.h+25) {
                            createExplosion(a.x, a.y, 1.6);
                            playSound('collision');
                            shake = 22;
                            handleCollision();
                            return;
                        }
                    }
                    
                    if (a.x < -120 || a.x > 920 || a.y < -120 || a.y > 720) {
                        arrows.splice(i,1);
                    } else allDone = false;
                } else allDone = false;
            }
            
            // Arrow-arrow collision
            for (let i = 0; i < arrows.length; i++) {
                for (let j = i+1; j < arrows.length; j++) {
                    const a1 = arrows[i], a2 = arrows[j];
                    if (a1.launched && a2.launched && Math.hypot(a1.x-a2.x, a1.y-a2.y) < 42) {
                        createExplosion((a1.x+a2.x)/2, (a1.y+a2.y)/2, 1.8);
                        playSound('collision');
                        shake = 26;
                        handleCollision();
                        return;
                    }
                }
            }
            
            if (arrows.length === 0 && launchedArrows.length > 0) levelComplete();
        }
        
        function activatePowerUp(pu) {
            playSound('powerup');
            createExplosion(pu.x, pu.y, 1.1);
            if (pu.type === 'time') timeLeft += 25;
            else if (pu.type === 'life' && lives < 5) lives++;
            else if (pu.type === 'slow') arrows.forEach(a => { if(a.launched) a.speed *= 0.58; });
            updateUI();
        }
        
        function handleCollision() {
            lives--;
            updateUI();
            if (lives <= 0) gameOver();
            else generateLevel(currentLevel);
        }
        
        function levelComplete() {
            saveHighScore();
            currentLevel++;
            createLevelUpEffect();
            timeLeft = Math.max(45, 110 - Math.floor(currentLevel * 1.55));
            generateLevel(currentLevel);
            updateUI();
            shake = 10;
        }
        
        function draw() {
            ctx.save();
            const sx = (Math.random()-0.5)*shake;
            const sy = (Math.random()-0.5)*shake;
            ctx.translate(sx + camera.offsetX, sy + camera.offsetY);
            ctx.scale(camera.scale, camera.scale);
            
            drawBackground();
            drawObstacles();
            arrows.forEach(drawArrow);
            drawPowerUps();
            drawParticles();
            
            ctx.restore();
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function updateUI() {
            document.getElementById('level-display').textContent = currentLevel;
            let hearts = '';
            for (let i = 0; i < 5; i++) hearts += i < lives ? '❤️' : '♡';
            document.getElementById('lives-display').innerHTML = hearts;
            
            const timerEl = document.getElementById('time-display');
            timerEl.textContent = Math.ceil(timeLeft);
            if (timeLeft <= 10) {
                timerEl.style.color = '#ff4444';
                timerEl.style.animation = 'pulse 0.6s infinite';
            } else {
                timerEl.style.color = '#ffff00';
                timerEl.style.animation = '';
            }
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState === 'playing') {
                    timeLeft--;
                    updateUI();
                    if (timeLeft <= 0) {
                        shake = 14;
                        handleCollision();
                    }
                }
            }, 1000);
        }
        
        function getCanvasPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left - camera.offsetX) / camera.scale,
                y: (clientY - rect.top - camera.offsetY) / camera.scale
            };
        }
        
        function canvasClick(e) {
            if (gameState !== 'playing') return;
            const pos = getCanvasPos(e.clientX || e.touches[0].clientX, e.clientY || e.touches[0].clientY);
            
            for (let i = powerUps.length-1; i >= 0; i--) {
                const pu = powerUps[i];
                if (Math.hypot(pos.x - pu.x, pos.y - pu.y) < 55) {
                    activatePowerUp(pu);
                    powerUps.splice(i,1);
                    return;
                }
            }
            
            for (let arrow of arrows) {
                if (!arrow.launched && Math.hypot(arrow.x - pos.x, arrow.y - pos.y) < 55) {
                    arrow.launched = true;
                    launchedArrows.push(arrow);
                    playSound('launch');
                    shake = 4;
                    break;
                }
            }
        }
        
        function handlePinch(e) {
            if (e.touches.length !== 2) return;
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (lastTouchDistance > 20) {
                const delta = (dist - lastTouchDistance) * 0.0022;
                camera.scale = Math.max(0.78, Math.min(1.68, camera.scale + delta));
            }
            lastTouchDistance = dist;
        }
        
        function startGame() {
            initAudio();
            document.getElementById('home-screen').style.display = 'none';
            gameState = 'playing';
            currentLevel = 1;
            lives = 5;
            hasUsedPause = false;
            timeLeft = 92;
            camera.scale = 1;
            shake = 0;
            generateLevel(1);
            updateUI();
            startTimer();
            document.getElementById('pause-btn').style.opacity = '1';
        }
        
        function pauseGame() {
            if (gameState !== 'playing' || hasUsedPause) return;
            hasUsedPause = true;
            gameState = 'paused';
            clearInterval(timerInterval);
            document.getElementById('pause-overlay').style.display = 'flex';
            document.getElementById('pause-btn').style.opacity = '0.3';
        }
        
        function resumeGame() {
            gameState = 'playing';
            document.getElementById('pause-overlay').style.display = 'none';
            startTimer();
        }
        
        function gameOver() {
            saveHighScore();
            gameState = 'gameover';
            clearInterval(timerInterval);
            document.getElementById('final-level-text').textContent = `REACHED LEVEL ${currentLevel-1}`;
            document.getElementById('game-over-screen').style.display = 'flex';
        }
        
        function restartGame() {
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'flex';
        }
        
        window.onload = () => {
            loadHighScore();
            canvas.addEventListener('click', canvasClick);
            canvas.addEventListener('touchstart', e => {
                if (e.touches.length === 1) canvasClick(e);
                else if (e.touches.length === 2) { lastTouchDistance = 0; handlePinch(e); }
            });
            canvas.addEventListener('touchmove', e => { if (e.touches.length === 2) handlePinch(e); });
            canvas.addEventListener('touchend', () => lastTouchDistance = 0);
            
            canvas.addEventListener('wheel', e => {
                if (gameState === 'playing') {
                    camera.scale = Math.max(0.78, Math.min(1.68, camera.scale - e.deltaY * 0.0011));
                }
            });
            
            gameLoop();
        };
    </script>
</body>
  </html>
