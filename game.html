<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  overflow:hidden;
  background:black;
  color:white;
}

/* HOME */

#homePage{
  width:100%;
  height:100vh;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow:hidden;
  background:
  linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
  url("https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1200&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
}

#homePage::before{
  content:"";
  position:absolute;
  inset:0;
  background:
  url("https://pngimg.com/d/snake_PNG4070.png");
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  opacity:0.12;
  filter:drop-shadow(0 0 40px red);
}

#homePage::after{
  content:"";
  position:absolute;
  inset:0;
  background:
  radial-gradient(circle at top left, rgba(255,0,0,0.25), transparent 40%),
  radial-gradient(circle at bottom right, rgba(255,120,0,0.3), transparent 40%);
}

.title{
  position:relative;
  z-index:2;
  font-size:70px;
  color:#ff2b2b;
  text-shadow:0 0 20px red;
}

.startBtn{
  position:relative;
  z-index:2;
  margin-top:30px;
  padding:18px 50px;
  border:none;
  border-radius:15px;
  background:linear-gradient(to right,#ff0000,#ff6600);
  color:white;
  font-size:25px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.startBtn:hover{
  transform:scale(1.05);
}

/* LEVEL SCREEN */

#levelScreen{
  display:none;
  width:100%;
  height:100vh;
  background:
  linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.85)),
  url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.levelTitle{
  font-size:45px;
  margin-bottom:30px;
  color:#ff4d4d;
}

.levels{
  width:90%;
  max-width:600px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.levelBtn{
  padding:18px;
  border:none;
  border-radius:12px;
  color:white;
  font-size:18px;
  background:#222;
}

.locked{
  background:#444;
  opacity:1;
}

/* GAME */

#gameContainer{
  display:none;
  width:100%;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
}

#gameArea{
  position:relative;
}

canvas{
  background:#111;
  border:4px solid #ff3300;
  box-shadow:0 0 30px red;
}

/* SCORE */

#scoreBoard{
  width:400px;
  display:flex;
  justify-content:space-between;
  margin-top:15px;
  margin-bottom:10px;
  font-size:20px;
  color:white;
}

/* PAUSE OVERLAY */

#pauseOverlay{
  position:absolute;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.55);
  font-size:45px;
  color:white;
  z-index:10;
}

/* CONTROLS */

#controls{
  margin-top:10px;
}

#controls button{
  width:70px;
  height:70px;
  border:none;
  border-radius:12px;
  margin:5px;
  background:#222;
  color:white;
  font-size:28px;
}

#controls button:active{
  background:red;
}

</style>

<script>

const body = document.body;

body.innerHTML = `

<div id="homePage">

<h1 class="title">Z-SNAKE</h1>

<button class="startBtn" id="openLevels">
START GAME
</button>

</div>

<div id="levelScreen">

<h1 class="levelTitle">SELECT LEVEL</h1>

<div class="levels" id="levels"></div>

</div>

<div id="gameContainer">

<div id="scoreBoard">

<div id="scoreText">Score : 0</div>

<div id="levelText">Level : 1</div>

</div>

<div id="gameArea">

<canvas id="gameCanvas" width="400" height="400"></canvas>

<div id="pauseOverlay">PAUSED</div>

</div>

<div id="controls">

<button id="up">⬆️</button>

<div>
<button id="left">⬅️</button>
<button id="right">➡️</button>
</div>

<button id="down">⬇️</button>

</div>

</div>

`;

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const pauseOverlay = document.getElementById("pauseOverlay");

const levelContainer = document.getElementById("levels");

let player;
let enemy;
let walls = [];

let direction = "right";
let enemyDir = "left";

let level = 1;
let score = 0;

let paused = false;

let game;

const levelData = [
  {speed:140,size:5},
  {speed:130,size:6},
  {speed:120,size:7},

  {speed:100,size:8},
  {speed:90,size:9},
  {speed:80,size:10},
  {speed:75,size:11},

  {speed:65,size:12},
  {speed:55,size:13},
  {speed:45,size:14}
];

/* LEVEL BUTTONS */

for(let i=1;i<=10;i++){

  const btn = document.createElement("button");

  btn.classList.add("levelBtn");

  if(i!==1){

    btn.classList.add("locked");
    btn.innerHTML = `🔐 Level ${i}`;

  }else{

    btn.innerHTML = `Level 1`;

  }

  btn.dataset.level = i;

  levelContainer.appendChild(btn);

}

document.getElementById("openLevels").onclick = ()=>{

  document.getElementById("homePage").style.display="none";

  document.getElementById("levelScreen").style.display="flex";

};

levelContainer.onclick = (e)=>{

  if(e.target.classList.contains("locked")) return;

  startGame(parseInt(e.target.dataset.level));

};

function startGame(lv){

  level = lv;

  const data = levelData[level-1];

  score = 0;

  document.getElementById("scoreText").innerHTML =
  "Score : "+score;

  document.getElementById("levelText").innerHTML =
  "Level : "+level;

  player = [];

  enemy = [];

  /* PLAYER */

  for(let i=0;i<data.size;i++){

    player.push({
      x:100 - i*20,
      y:200
    });

  }

  /* ENEMY */

  for(let i=0;i<data.size-2;i++){

    enemy.push({
      x:300 + i*20,
      y:200
    });

  }

  direction="right";
  enemyDir="left";

  generateWalls();

  document.getElementById("levelScreen").style.display="none";

  document.getElementById("gameContainer").style.display="flex";

  clearInterval(game);

  game = setInterval(update,data.speed);

}

/* WALLS */

function generateWalls(){

  walls=[];

  for(let i=0;i<6;i++){

    walls.push({
      x:Math.floor(Math.random()*18)*20,
      y:Math.floor(Math.random()*18)*20
    });

  }

}

/* UPDATE */

function update(){

  if(paused) return;

  moveSnake(player,direction);

  moveSnake(enemy,enemyDir);

  const enemyHead = enemy[0];

  /* AI */

  if(enemyHead.x <= 0){

    enemyDir="right";

  }

  if(enemyHead.x >= 380){

    enemyDir="left";

  }

  if(enemyHead.y <= 0){

    enemyDir="down";

  }

  if(enemyHead.y >= 380){

    enemyDir="up";

  }

  /* WALL COLLISION */

  for(let wall of walls){

    if(enemyHead.x===wall.x &&
       enemyHead.y===wall.y){

      nextLevel();

      return;

    }

  }

  /* PLAYER HIT */

  for(let wall of walls){

    if(player[0].x===wall.x &&
       player[0].y===wall.y){

      gameOver();

      return;

    }

  }

  /* ENEMY HIT PLAYER */

  if(player[0].x===enemyHead.x &&
     player[0].y===enemyHead.y){

    gameOver();

    return;

  }

  draw();

}

/* MOVE */

function moveSnake(arr,dir){

  const head = {...arr[0]};

  if(dir==="up") head.y-=20;
  if(dir==="down") head.y+=20;
  if(dir==="left") head.x-=20;
  if(dir==="right") head.x+=20;

  arr.unshift(head);

  arr.pop();

}

/* NEXT LEVEL */

function nextLevel(){

  clearInterval(game);

  score += 100;

  if(level < 10){

    const nextBtn = document.querySelector(
    \`[data-level="\${level+1}"]\`
    );

    nextBtn.classList.remove("locked");

    nextBtn.innerHTML = \`Level \${level+1}\`;

    startGame(level+1);

  }else{

    alert("🔥 YOU WON ALL LEVELS 🔥");

    location.reload();

  }

}

/* DRAW */

function draw(){

  ctx.clearRect(0,0,400,400);

  /* WALLS */

  ctx.fillStyle="#ff5500";

  walls.forEach(w=>{

    ctx.fillRect(w.x,w.y,20,20);

  });

  /* PLAYER */

  player.forEach((p,i)=>{

    ctx.fillStyle = i===0 ? "red" : "#cc0000";

    ctx.fillRect(p.x,p.y,20,20);

  });

  /* ENEMY */

  enemy.forEach((e,i)=>{

    ctx.fillStyle = i===0 ? "#00ffcc" : "#00aa88";

    ctx.fillRect(e.x,e.y,20,20);

  });

}

/* CONTROLS */

document.getElementById("up").onclick=()=>{
if(direction!=="down") direction="up";
};

document.getElementById("down").onclick=()=>{
if(direction!=="up") direction="down";
};

document.getElementById("left").onclick=()=>{
if(direction!=="right") direction="left";
};

document.getElementById("right").onclick=()=>{
if(direction!=="left") direction="right";
};

/* KEYBOARD */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp" && direction!=="down"){
direction="up";
}

if(e.key==="ArrowDown" && direction!=="up"){
direction="down";
}

if(e.key==="ArrowLeft" && direction!=="right"){
direction="left";
}

if(e.key==="ArrowRight" && direction!=="left"){
direction="right";
}

});

/* TAP TO PAUSE */

canvas.onclick = ()=>{

paused = !paused;

pauseOverlay.style.display =
paused ? "flex" : "none";

};

/* GAME OVER */

function gameOver(){

clearInterval(game);

alert("💀 GAME OVER 💀");

location.reload();

}

    </script>
